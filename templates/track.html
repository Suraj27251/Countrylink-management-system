<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your broadband installation and service requests in real time with CountryLinks.">
    <title>Track Your Service - CountryLinks</title>
    <style>
        /* ===== CSS Custom Properties ===== */
        :root {
            --color-dark-blue-deep: #0a0e27;
            --color-dark-blue: #0f1332;
            --color-dark-blue-light: #1a1f3a;
            --color-cyan: #00d4ff;
            --color-cyan-light: #00f5ff;
            --color-white: #ffffff;
            --color-text: #e0e6f0;
            --color-error: #ff4d6a;
            --color-success: #00e676;
            --font-size-min: 14px;
            --panel-blur: 12px;
            --panel-bg-opacity: 0.15;
            --panel-border-opacity: 0.2;
            --transition-fast: 0.2s;
            --transition-medium: 0.3s;
            --easing-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: var(--font-size-min);
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--color-text);
            background: linear-gradient(135deg, var(--color-dark-blue-deep) 0%, var(--color-dark-blue) 50%, var(--color-dark-blue-light) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ===== Typography — enforce minimum 14px ===== */
        p, span, label, input, button, a, li, td, th, div {
            font-size: max(1rem, 14px);
        }

        h1 {
            font-size: max(1.75rem, 24px);
            color: var(--color-white);
            font-weight: 700;
        }

        h2 {
            font-size: max(1.25rem, 18px);
            color: var(--color-white);
            font-weight: 600;
        }

        /* ===== Header ===== */
        .site-header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .site-header .logo {
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        /* ===== Main Content ===== */
        .site-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            z-index: 10;
        }

        /* ===== Glassmorphism Panel ===== */
        .glass-panel {
            background: rgba(255, 255, 255, var(--panel-bg-opacity));
            backdrop-filter: blur(var(--panel-blur));
            -webkit-backdrop-filter: blur(var(--panel-blur));
            border: 1px solid rgba(255, 255, 255, var(--panel-border-opacity));
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* ===== Backdrop-filter Fallback ===== */
        .glass-panel.no-backdrop-filter {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            background: rgba(15, 19, 50, 0.9);
        }

        /* ===== Mascot Container (placeholder) ===== */
        .mascot-container {
            width: 100%;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mascot {
            display: block;
            width: 100%;
            max-width: 180px;
            height: auto;
        }

        /* ===== Form Container (placeholder) ===== */
        .form-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .form-placeholder {
            width: 100%;
            padding: 1.5rem;
            border-radius: 12px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px dashed rgba(0, 212, 255, 0.2);
            text-align: center;
            color: var(--color-cyan);
            font-size: max(0.875rem, 14px);
        }

        /* ===== Subtitle ===== */
        .subtitle {
            text-align: center;
            color: var(--color-text);
            font-size: max(0.875rem, 14px);
            opacity: 0.8;
            line-height: 1.5;
        }

        /* ===== Footer ===== */
        .site-footer {
            padding: 1.5rem 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
            color: rgba(255, 255, 255, 0.5);
            font-size: max(0.875rem, 14px);
        }

        .site-footer a {
            color: var(--color-cyan);
            text-decoration: none;
            transition: color var(--transition-fast) var(--easing-out);
        }

        .site-footer a:hover {
            color: var(--color-cyan-light);
        }

        /* ===== Particle Canvas (placeholder) ===== */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== CSS Fallback Animations ===== */
        @keyframes blink {
            0%, 90%, 100% {
                transform: scaleY(1);
            }
            95% {
                transform: scaleY(0.1);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* Hover transition for buttons (CSS fallback) */
        .btn-track {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 2rem;
            min-height: 44px;
            min-width: 44px;
            background: linear-gradient(135deg, var(--color-cyan), var(--color-cyan-light));
            color: var(--color-dark-blue-deep);
            font-weight: 700;
            font-size: max(1rem, 14px);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform var(--transition-fast) var(--easing-out),
                        box-shadow var(--transition-fast) var(--easing-out);
        }

        .btn-track:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-track:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 212, 255, 0.3);
        }

        /* Focus glow for inputs (CSS fallback) */
        .input-track {
            width: 100%;
            padding: 0.875rem 1.25rem;
            min-height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--color-white);
            font-size: max(1rem, 14px);
            outline: none;
            transition: border-color var(--transition-fast) var(--easing-out),
                        box-shadow var(--transition-fast) var(--easing-out);
        }

        .input-track::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-track:focus {
            border-color: var(--color-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.25), 0 0 15px rgba(0, 212, 255, 0.15);
        }

        .input-track.input-glow {
            border-color: var(--color-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.25), 0 0 15px rgba(0, 212, 255, 0.15);
        }

        /* ===== Form Styles ===== */
        #tracking-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .form-messages {
            width: 100%;
            min-height: 1.5em;
            font-size: max(0.875rem, 14px);
            text-align: center;
            padding: 0.25rem 0.5rem;
            border-radius: 8px;
        }

        .form-messages.error {
            color: var(--color-error);
        }

        .form-messages.success {
            color: var(--color-success);
        }

        .form-messages.info {
            color: var(--color-cyan);
        }

        .btn-track:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-track:disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .btn-track .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(10, 14, 39, 0.3);
            border-top-color: var(--color-dark-blue-deep);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Screen reader only utility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Focus indicator for keyboard navigation */
        *:focus-visible {
            outline: 2px solid var(--color-cyan);
            outline-offset: 2px;
        }

        /* ===== Responsive Design ===== */

        /* Tablets and small desktops */
        @media (min-width: 768px) {
            .glass-panel {
                padding: 3rem 2.5rem;
            }

            .mascot-container {
                min-height: 120px;
            }
        }

        /* Large desktops */
        @media (min-width: 1200px) {
            .glass-panel {
                max-width: 520px;
                padding: 3.5rem 3rem;
            }
        }

        /* Mobile — below 768px */
        @media (max-width: 767px) {
            .site-header {
                padding: 1rem 1rem;
            }

            .site-header .logo {
                height: 40px;
            }

            .site-main {
                padding: 1rem 0.75rem;
            }

            .glass-panel {
                padding: 1.5rem 1.25rem;
                border-radius: 16px;
                gap: 1rem;
            }

            /* Stacked layout: mascot above form */
            .glass-panel {
                flex-direction: column;
                align-items: center;
            }

            /* Mascot scales down on mobile */
            .mascot-container {
                min-height: 80px;
            }

            #mascot {
                max-width: 120px;
            }

            /* Touch targets ≥44px on mobile */
            .btn-track,
            .input-track {
                min-height: 44px;
                min-width: 44px;
                padding: 0.875rem 1.25rem;
            }

            .site-footer {
                padding: 1rem;
            }
        }

        /* Small mobile */
        @media (max-width: 374px) {
            .glass-panel {
                padding: 1.25rem 1rem;
                border-radius: 12px;
            }

            h1 {
                font-size: max(1.5rem, 20px);
            }
        }

        /* Ensure no horizontal overflow at any width 320px–1920px */
        @media (max-width: 320px) {
            body {
                min-width: 320px;
            }

            .glass-panel {
                max-width: 100%;
                margin: 0 0.5rem;
            }
        }

        /* ===== Reduced Motion ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Background particle canvas (rendered by JS in task 3.1) -->
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <!-- Header -->
    <header class="site-header">
        <img src="/static/img/Countrylink_logo_white.png" alt="CountryLinks Broadband" class="logo">
    </header>

    <!-- Main Content -->
    <main class="site-main">
        <div class="glass-panel" id="glass-panel">
            <!-- Mascot SVG (broadband robot assistant) -->
            <div class="mascot-container" id="mascot-container">
                <svg id="mascot" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img" style="width: 100%; max-width: 180px; height: auto;">
                    <defs>
                        <!-- Body gradient for 3D effect -->
                        <linearGradient id="body-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#1a2a5e"/>
                            <stop offset="40%" stop-color="#0f1b4a"/>
                            <stop offset="100%" stop-color="#0a0e27"/>
                        </linearGradient>
                        <!-- Body highlight for 3D depth -->
                        <radialGradient id="body-highlight" cx="35%" cy="30%" r="60%">
                            <stop offset="0%" stop-color="rgba(0,212,255,0.15)"/>
                            <stop offset="100%" stop-color="rgba(0,212,255,0)"/>
                        </radialGradient>
                        <!-- Eye socket gradient -->
                        <radialGradient id="eye-socket-gradient" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#0a1025"/>
                            <stop offset="100%" stop-color="#050810"/>
                        </radialGradient>
                        <!-- Pupil gradient for 3D look -->
                        <radialGradient id="pupil-gradient" cx="40%" cy="35%" r="50%">
                            <stop offset="0%" stop-color="#00f5ff"/>
                            <stop offset="60%" stop-color="#00d4ff"/>
                            <stop offset="100%" stop-color="#0099cc"/>
                        </radialGradient>
                        <!-- Antenna glow -->
                        <radialGradient id="antenna-glow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#00f5ff"/>
                            <stop offset="50%" stop-color="#00d4ff"/>
                            <stop offset="100%" stop-color="rgba(0,212,255,0)"/>
                        </radialGradient>
                        <!-- Drop shadow filter -->
                        <filter id="mascot-shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,212,255,0.3)"/>
                        </filter>
                        <!-- Inner glow for eye sockets -->
                        <filter id="eye-glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
                            <feMerge>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <!-- Signal wave glow -->
                        <filter id="signal-glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
                        </filter>
                    </defs>

                    <!-- Antenna structure -->
                    <g id="mascot-antenna">
                        <!-- Antenna pole -->
                        <rect x="96" y="28" width="8" height="30" rx="4" fill="url(#body-gradient)" stroke="rgba(0,212,255,0.4)" stroke-width="0.5"/>
                        <!-- Antenna tip (glowing orb) -->
                        <circle cx="100" cy="24" r="8" fill="url(#antenna-glow)" opacity="0.9"/>
                        <circle cx="100" cy="24" r="4" fill="#00f5ff"/>
                        <!-- Signal waves -->
                        <path d="M 78 20 Q 72 12 78 4" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#signal-glow)"/>
                        <path d="M 72 22 Q 64 12 72 2" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round" opacity="0.4" filter="url(#signal-glow)"/>
                        <path d="M 122 20 Q 128 12 122 4" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#signal-glow)"/>
                        <path d="M 128 22 Q 136 12 128 2" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round" opacity="0.4" filter="url(#signal-glow)"/>
                    </g>

                    <!-- Robot head/body (rounded rectangle) -->
                    <g id="mascot-head" filter="url(#mascot-shadow)">
                        <rect x="40" y="55" width="120" height="110" rx="35" ry="35" fill="url(#body-gradient)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
                        <!-- 3D highlight overlay -->
                        <rect x="40" y="55" width="120" height="110" rx="35" ry="35" fill="url(#body-highlight)"/>
                        <!-- Top edge highlight for 3D -->
                        <path d="M 75 57 Q 100 52 125 57" fill="none" stroke="rgba(0,212,255,0.25)" stroke-width="1" stroke-linecap="round"/>
                    </g>

                    <!-- Left eye socket -->
                    <ellipse id="left-eye-socket" cx="75" cy="105" rx="18" ry="20" fill="url(#eye-socket-gradient)" stroke="rgba(0,212,255,0.4)" stroke-width="1.2"/>
                    <!-- Left pupil (movable via JS) -->
                    <circle id="left-pupil" cx="75" cy="105" r="7" fill="url(#pupil-gradient)" filter="url(#eye-glow)"/>
                    <!-- Left eye reflection dot -->
                    <circle cx="72" cy="101" r="2.5" fill="rgba(255,255,255,0.7)"/>

                    <!-- Right eye socket -->
                    <ellipse id="right-eye-socket" cx="125" cy="105" rx="18" ry="20" fill="url(#eye-socket-gradient)" stroke="rgba(0,212,255,0.4)" stroke-width="1.2"/>
                    <!-- Right pupil (movable via JS) -->
                    <circle id="right-pupil" cx="125" cy="105" r="7" fill="url(#pupil-gradient)" filter="url(#eye-glow)"/>
                    <!-- Right eye reflection dot -->
                    <circle cx="122" cy="101" r="2.5" fill="rgba(255,255,255,0.7)"/>

                    <!-- Mouth (friendly smile) -->
                    <path d="M 82 138 Q 100 150 118 138" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

                    <!-- Broadband-themed chest indicator -->
                    <g opacity="0.6">
                        <!-- WiFi signal icon on chest -->
                        <path d="M 93 170 Q 100 163 107 170" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M 89 175 Q 100 165 111 175" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
                        <path d="M 85 180 Q 100 167 115 180" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                        <circle cx="100" cy="173" r="2" fill="#00d4ff"/>
                    </g>

                    <!-- Side accents (ears/sensors) -->
                    <rect x="30" y="95" width="12" height="20" rx="6" fill="url(#body-gradient)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
                    <rect x="158" y="95" width="12" height="20" rx="6" fill="url(#body-gradient)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>

                    <!-- Small decorative dots (data indicators) -->
                    <circle cx="55" cy="140" r="2" fill="#00d4ff" opacity="0.5"/>
                    <circle cx="145" cy="140" r="2" fill="#00d4ff" opacity="0.5"/>
                    <circle cx="55" cy="148" r="1.5" fill="#00d4ff" opacity="0.3"/>
                    <circle cx="145" cy="148" r="1.5" fill="#00d4ff" opacity="0.3"/>
                </svg>
            </div>

            <!-- Tracking Form -->
            <div class="form-container" id="form-container">
                <form id="tracking-form" novalidate>
                    <label for="tracking-input" class="sr-only">Tracking ID</label>
                    <input
                        type="text"
                        id="tracking-input"
                        class="input-track"
                        placeholder="Enter Tracking ID"
                        maxlength="30"
                        autocomplete="off"
                        aria-label="Tracking ID"
                    >
                    <button type="submit" class="btn-track">Track Status</button>
                    <div id="form-messages" class="form-messages" aria-live="assertive" role="status"></div>
                </form>
            </div>

            <!-- Subtitle -->
            <p class="subtitle">Track your broadband installation and service requests in real time</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p>&copy; 2024 <a href="https://countrylinks.in" target="_blank" rel="noopener">CountryLinks Broadband</a>. All rights reserved.</p>
    </footer>

    <!-- GSAP CDN with fallback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" onerror="window.__gsapFailed=true;"></script>

    <!-- Main Application Script -->
    {% raw %}
    <script>
    (function() {
        'use strict';

        // ===== Initialization Module =====
        const Initialization = {
            gsapLoaded: false,
            reducedMotion: false,
            backdropFilterSupported: true,

            /**
             * Bootstrap the application modules in sequence.
             */
            init: function() {
                this.detectBackdropFilter();
                this.detectGSAP();
                this.detectReducedMotion();
                this.bootstrapModules();
            },

            /**
             * Check if backdrop-filter is supported; apply fallback class if not.
             */
            detectBackdropFilter: function() {
                var supported = CSS.supports('backdrop-filter', 'blur(10px)') ||
                                CSS.supports('-webkit-backdrop-filter', 'blur(10px)');
                this.backdropFilterSupported = supported;
                if (!supported) {
                    var panel = document.getElementById('glass-panel');
                    if (panel) {
                        panel.classList.add('no-backdrop-filter');
                    }
                }
            },

            /**
             * Check if GSAP loaded successfully.
             */
            detectGSAP: function() {
                this.gsapLoaded = (typeof window.gsap !== 'undefined') && !window.__gsapFailed;
            },

            /**
             * Detect prefers-reduced-motion initial state.
             * Change listening is handled by the Accessibility module.
             */
            detectReducedMotion: function() {
                var mql = window.matchMedia('(prefers-reduced-motion: reduce)');
                this.reducedMotion = mql.matches;
            },

            /**
             * Bootstrap all modules in the correct order.
             */
            bootstrapModules: function() {
                AnimationEngine.init();
                EyeTracker.init();
                ParticleSystem.init();
                FormHandler.init();
                Accessibility.init();

                // Wire GSAP-enhanced hover/focus effects on form elements
                var trackBtn = document.querySelector('.btn-track');
                var trackInput = document.getElementById('tracking-input');
                AnimationEngine.createHoverEffect(trackBtn);
                AnimationEngine.createFocusEffect(trackInput);
            }
        };

        // ===== Animation Engine Module =====
        var AnimationEngine = {
            /** Whether GSAP loaded successfully */
            gsapAvailable: false,

            /** Whether reduced-motion is preferred */
            reducedMotion: false,

            /**
             * Initialize the animation engine.
             */
            init: function() {
                this.gsapAvailable = Initialization.gsapLoaded;
                this.reducedMotion = Initialization.reducedMotion;
            },

            /**
             * Animate an element using GSAP when available, or CSS transitions as fallback.
             * @param {Element} element - The DOM element to animate.
             * @param {Object} properties - CSS properties to animate to (e.g., {opacity: 1, y: -3}).
             * @param {Object} options - Animation options (e.g., {duration: 0.3, ease: 'power2.out'}).
             */
            animate: function(element, properties, options) {
                if (!element) return;

                options = options || {};
                var duration = options.duration || 0.3;
                var ease = options.ease || 'power2.out';

                if (this.gsapAvailable && !this.reducedMotion) {
                    // Use GSAP
                    var gsapOpts = Object.assign({}, properties, {
                        duration: duration,
                        ease: ease
                    });
                    if (options.onComplete) {
                        gsapOpts.onComplete = options.onComplete;
                    }
                    window.gsap.to(element, gsapOpts);
                } else {
                    // CSS transition fallback
                    var cssDuration = (this.reducedMotion ? 0.01 : duration) + 's';
                    element.style.transition = 'all ' + cssDuration + ' ease-out';

                    // Map GSAP-style properties to CSS
                    for (var prop in properties) {
                        if (properties.hasOwnProperty(prop)) {
                            if (prop === 'y') {
                                element.style.transform = 'translateY(' + properties[prop] + 'px)';
                            } else if (prop === 'x') {
                                element.style.transform = 'translateX(' + properties[prop] + 'px)';
                            } else if (prop === 'scale') {

                var offsetY = this.parallaxOffset.y;

                for (var i = 0; i < this.particles.length; i++) {
                    var p = this.particles[i];
                    this.ctx.beginPath();
                    this.ctx.arc(p.x + offsetX, p.y + offsetY, p.size, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.fill();
                    this.ctx.closePath();
                }

                // Reset global alpha
                this.ctx.globalAlpha = 1;
            },

            /**
             * Track frame rate and reduce particles by 50% if average fps drops below 30.
             * @param {number} delta - Time since last frame in ms.
             */
            _trackFrameRate: function(delta) {
                this.frameTimes.push(delta);

                // Keep last 60 frame times for averaging
                if (this.frameTimes.length > 60) {
                    this.frameTimes.shift();
                }

                // Check every 60 frames (only reduce once)
                if (this.frameTimes.length === 60 && !this.fpsReduced) {
                    var avgDelta = this.frameTimes.reduce(function(sum, t) { return sum + t; }, 0) / this.frameTimes.length;
                    var avgFPS = 1000 / avgDelta;

                    if (avgFPS < this.config.minFPS) {
                        // Reduce particle count by 50%
                        var newCount = Math.ceil(this.particles.length / 2);
                        this.particles = this.particles.slice(0, newCount);
                        this.fpsReduced = true;
                    }
                }
            },

            /**
             * Handle window resize — update canvas dimensions.
             */
            _onResize: function() {
                if (!this.canvas) return;
                this._setCanvasSize();
            },

            /**
             * Pause animation loop.
             */
            pause: function() {
                this.running = false;
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }
            },

            /**
             * Resume animation loop.
             * Will not resume if prefers-reduced-motion is active.
             */
            resume: function() {
                if (this.running) return;
                // Don't resume if reduced motion is active
                if (AnimationEngine.reducedMotion || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    return;
                }
                this.running = true;
                this.lastFrameTime = performance.now();
                this.animate();
            },

            /**
             * Destroy particle system — cancel animation, clear particles, clear canvas, remove listeners.
             */
            destroy: function() {
                this.running = false;
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }
                this.particles = [];
                if (this.ctx && this.canvas) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }
                if (this.resizeHandler) {
                    window.removeEventListener('resize', this.resizeHandler);
                    this.resizeHandler = null;
                }
            },

            /**
             * Utility: random integer between min and max (inclusive).
             */
            _randomInt: function(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            },

            /**
             * Utility: random float between min and max.
             */
            _randomFloat: function(min, max) {
                return Math.random() * (max - min) + min;
            }
        };

        // ===== Form Handler Module =====
        var FormHandler = {
            form: null,
            input: null,
            button: null,
            messagesDiv: null,
            originalButtonText: 'Track Status',
            isLoading: false,

            config: {
                maxLength: 30,
                validPattern: /^[a-zA-Z0-9-]{1,30}$/,
                timeout: 15000,
                apiEndpoint: '/api/track'
            },

            /**
             * Initialize form event listeners.
             * @param {HTMLFormElement} [formElement] - Optional form element (defaults to #tracking-form).
             */
            init: function(formElement) {
                this.form = formElement || document.getElementById('tracking-form');
                if (!this.form) return;

                this.input = this.form.querySelector('#tracking-input');
                this.button = this.form.querySelector('.btn-track');
                this.messagesDiv = document.getElementById('form-messages');

                if (!this.input || !this.button) return;

                this.originalButtonText = this.button.textContent;

                // Attach submit listener
                var self = this;
                this.form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    self.clearMessages();
                    var trackingId = self.input.value.trim();
                    var result = self.validate(trackingId);
                    if (!result.valid) {
                        self.showMessage(result.message, 'error');
                        self.input.focus();
                        return;
                    }
                    self.submit(trackingId);
                });

                // Focus glow is handled by AnimationEngine.createFocusEffect() (wired in bootstrapModules)
                // EyeTracker.lookAtInput() is triggered by EyeTracker's own focus listener (wired in EyeTracker.init)
            },

            /**
             * Validate tracking ID format.
             * Pure function: accepts a string, returns {valid, message}.
             * @param {string} trackingId - The tracking ID to validate.
             * @returns {{valid: boolean, message?: string}} Validation result.
             */
            validate: function(trackingId) {
                if (!trackingId || trackingId.length === 0) {
                    return { valid: false, message: 'Please enter a Tracking ID' };
                }
                if (!this.config.validPattern.test(trackingId)) {
                    return { valid: false, message: 'Tracking ID can only contain letters, numbers, and hyphens' };
                }
                return { valid: true };
            },

            /**
             * Submit tracking lookup request using fetch with AbortController timeout.
             * @param {string} trackingId - The validated tracking ID.
             * @returns {Promise<void>}
             */
            submit: function(trackingId) {
                var self = this;
                self.showLoading();
                self.clearMessages();

                var controller = new AbortController();
                var timeoutId = setTimeout(function() {
                    controller.abort();
                }, self.config.timeout);

                var url = self.config.apiEndpoint + '?id=' + encodeURIComponent(trackingId);

                fetch(url, {
                    method: 'GET',
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/json'
                    }
                })
                .then(function(response) {
                    clearTimeout(timeoutId);
                    if (!response.ok) {
                        if (response.status >= 400 && response.status < 500) {
                            throw new Error('Tracking ID not found. Please check and try again.');
                        } else if (response.status >= 500) {
                            throw new Error('Server error. Please try again later.');
                        }
                        throw new Error('Request failed with status ' + response.status);
                    }
                    return response.json().catch(function() {
                        throw new Error('Invalid response from server. Please try again.');
                    });
                })
                .then(function(data) {
                    self.hideLoading();
                    if (data && data.status) {
                        self.showMessage('Status: ' + data.status + (data.message ? ' — ' + data.message : ''), 'success');
                    } else if (data && data.message) {
                        self.showMessage(data.message, 'info');
                    } else {
                        self.showMessage('Tracking information retrieved successfully.', 'success');
                    }
                })
                .catch(function(error) {
                    clearTimeout(timeoutId);
                    self.hideLoading();
                    if (error.name === 'AbortError') {
                        self.showMessage('Request timed out. Please try again.', 'error');
                    } else if (error.message === 'Failed to fetch' || error.name === 'TypeError') {
                        self.showMessage('Network error. Please check your connection and try again.', 'error');
                    } else {
                        self.showMessage(error.message || 'An unexpected error occurred. Please try again.', 'error');
                    }
                });
            },

            /**
             * Show loading state: disable button, show spinner.
             */
            showLoading: function() {
                if (!this.button) return;
                this.isLoading = true;
                this.button.disabled = true;
                this.button.innerHTML = '<span class="spinner"></span> Loading...';
            },

            /**
             * Hide loading state: re-enable button, restore original text.
             */
            hideLoading: function() {
                if (!this.button) return;
                this.isLoading = false;
                this.button.disabled = false;
                this.button.textContent = this.originalButtonText;
            },

            /**
             * Display a message in the ARIA live region.
             * @param {string} message - The message text.
             * @param {string} type - Message type: 'error', 'success', or 'info'.
             */
            showMessage: function(message, type) {
                if (!this.messagesDiv) return;
                this.messagesDiv.textContent = message;
                this.messagesDiv.className = 'form-messages ' + (type || 'info');
            },

            /**
             * Clear displayed messages.
             */
            clearMessages: function() {
                if (!this.messagesDiv) return;
                this.messagesDiv.textContent = '';
                this.messagesDiv.className = 'form-messages';
            }
        };

        // ===== Accessibility Module =====
        var Accessibility = {
            reducedMotionMql: null,

            /**
             * Initialize accessibility features:
             * - Set up reduced-motion listener and coordinate with other modules
             * - Set up keyboard navigation handlers (Escape to close messages)
             * - Verify focus indicators are in place (handled by CSS *:focus-visible)
             */
            init: function() {
                this._setupReducedMotionListener();
                this._setupKeyboardNavigation();
                this._applyCurrentReducedMotionState();
            },

            /**
             * Set up the prefers-reduced-motion media query listener.
             * Coordinates with AnimationEngine, ParticleSystem, and EyeTracker
             * when the preference changes.
             */
            _setupReducedMotionListener: function() {
                var self = this;
                this.reducedMotionMql = window.matchMedia('(prefers-reduced-motion: reduce)');

                this.reducedMotionMql.addEventListener('change', function(e) {
                    self._onReducedMotionChange(e.matches);
                });
            },

            /**
             * Apply the current reduced-motion state on initialization.
             * If reduced motion is already active when the page loads, ensure
             * non-essential animations are disabled.
             */
            _applyCurrentReducedMotionState: function() {
                if (Initialization.reducedMotion) {
                    this._onReducedMotionChange(true);
                }
            },

            /**
             * Handle reduced-motion preference changes.
             * When reduced-motion activates:
             *   - Destroy ParticleSystem (particles, parallax)
             *   - Stop EyeTracker idle loop (idle mascot animations)
             *   - Disable hover lift effects via AnimationEngine.reducedMotion flag
             * When reduced-motion deactivates:
             *   - Re-initialize ParticleSystem
             *   - Resume normal EyeTracker behavior
             *   - Re-enable hover lift effects
             *
             * Essential functionality is always preserved:
             *   - Form feedback (validation messages, loading states)
             *   - Focus indicators (CSS *:focus-visible)
             *
             * @param {boolean} isReduced - Whether prefers-reduced-motion is now active.
             */
            _onReducedMotionChange: function(isReduced) {
                // Update the shared state
                Initialization.reducedMotion = isReduced;
                AnimationEngine.onReducedMotionChange(isReduced);

                if (isReduced) {
                    // Disable non-essential animations
                    ParticleSystem.destroy();
                    EyeTracker.stopIdleLoop();
                } else {
                    // Re-enable animations
                    if (!ParticleSystem.running) {
                        ParticleSystem.init();
                    }
                    // EyeTracker idle loop will restart naturally on next idle timeout
                }
            },

            /**
             * Set up keyboard navigation handlers.
             * - Escape key: closes/clears form messages
             * - Tab navigation is handled naturally by HTML order (input → button)
             * - Enter on button submits form (handled by form submit event)
             */
            _setupKeyboardNavigation: function() {
                document.addEventListener('keydown', function(e) {
                    // Escape key: clear form messages
                    if (e.key === 'Escape' || e.keyCode === 27) {
                        if (FormHandler && FormHandler.messagesDiv && FormHandler.messagesDiv.textContent) {
                            FormHandler.clearMessages();
                        }
                    }
                });
            }
        };

        // Expose modules globally for inter-module communication
        window.Initialization = Initialization;
        window.AnimationEngine = AnimationEngine;
        window.EyeTracker = EyeTracker;
        window.ParticleSystem = ParticleSystem;
        window.FormHandler = FormHandler;
        window.Accessibility = Accessibility;

        // Bootstrap on DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                Initialization.init();
            });
        } else {
            Initialization.init();
        }
    })();
    </script>
