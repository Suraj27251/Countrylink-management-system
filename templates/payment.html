<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countrylink — Internet Plan Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --card: #13131a;
      --text: #f0ede8;
      --muted: #8a8490;
      --primary: #ff6b1a;
      --primary-dim: rgba(255, 107, 26, 0.10);
      --primary-glow: rgba(255, 107, 26, 0.30);
      --accent: #ff9500;
      --accent2: #e63c00;
      --border: rgba(255, 107, 26, 0.14);
      --border-hover: rgba(255, 107, 26, 0.45);
      --green: #39d98a;
      --gold: #ffba00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 45% at 15% -5%, rgba(255,107,26,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 55% 40% at 85% 105%, rgba(230,60,0,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 35% 55% at 50% 50%, rgba(255,149,0,0.04) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,107,26,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,26,0.025) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none; z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      max-width: 1180px;
      margin: 32px auto;
      padding: 0 20px 60px;
      animation: pageIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes pageIn {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 26px;
      background: rgba(19,19,26,0.88);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(24px);
      margin-bottom: 26px;
      animation: slideDown 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .back-btn {
      width:42px; height:42px; border-radius:12px;
      border:1px solid var(--border); background:transparent;
      color:var(--muted); display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.25s ease;
    }
    .back-btn:hover {
      border-color:var(--primary); color:var(--primary);
      background:var(--primary-dim); box-shadow:0 0 16px var(--primary-glow);
    }
    .logo img { height: 44px; display:block; }
    .secure-badge {
      display:flex; align-items:center; gap:8px;
      background:rgba(57,217,138,0.08); border:1px solid rgba(57,217,138,0.22);
      color:var(--green); border-radius:999px; padding:8px 16px;
      font-size:0.76rem; font-weight:700; letter-spacing:0.08em;
    }
    .secure-dot {
      width:7px; height:7px; background:var(--green);
      border-radius:50%; box-shadow:0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1);}
      50%{opacity:0.5;transform:scale(1.5);}
    }

    /* MAIN GRID */
    .main-content {
      display:grid; grid-template-columns:1.3fr 0.7fr;
      gap:22px; align-items:start;
    }
    .left-panel { display:flex; flex-direction:column; gap:18px; }

    /* SECTION CARD */
    .section-card {
      background:rgba(19,19,26,0.75);
      border:1px solid var(--border);
      border-radius:20px; padding:24px;
      backdrop-filter:blur(16px);
      animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    .section-card:nth-child(1){animation-delay:0.15s;}
    .section-card:nth-child(2){animation-delay:0.25s;}
    .section-card:nth-child(3){animation-delay:0.35s;}
    @keyframes cardIn {
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }

    .section-header {
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
    }
    .section-number {
      width:28px; height:28px;
      background:linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      font-family:'Outfit',sans-serif; font-weight:800; font-size:0.8rem; color:#fff;
      flex-shrink:0; box-shadow:0 4px 14px rgba(255,107,26,0.4);
    }
    .section-header h2 {
      font-family:'Outfit',sans-serif; font-weight:700;
      font-size:0.93rem; letter-spacing:0.08em; color:var(--text);
    }
    .section-header .tag {
      margin-left:auto; font-size:0.7rem;
      background:var(--primary-dim); color:var(--primary);
      border:1px solid rgba(255,107,26,0.2);
      padding:4px 10px; border-radius:999px; font-weight:700; letter-spacing:0.05em;
    }
    .section-header .optional {
      margin-left:auto; font-size:0.7rem;
      background:rgba(138,132,144,0.1); color:var(--muted);
      padding:4px 10px; border-radius:999px;
    }

    /* PLAN OPTIONS */
    .plan-options { display:flex; flex-direction:column; gap:9px; margin-bottom:20px; }
    .plan-option {
      position:relative; border:1px solid var(--border); border-radius:14px;
      padding:13px 18px; background:rgba(255,255,255,0.02);
      cursor:pointer; transition:all 0.25s cubic-bezier(0.22,1,0.36,1); display:block; overflow:hidden;
    }
    .plan-option::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:linear-gradient(to bottom, var(--accent), var(--accent2));
      opacity:0; transition:opacity 0.25s ease; border-radius:3px 0 0 3px;
    }
    .plan-option input[type="radio"] { display:none; }
    .plan-content {
      display:flex; align-items:center; justify-content:space-between;
    }
    .plan-name { font-weight:600; font-size:0.9rem; color:var(--text); }
    .plan-price {
      font-family:'Outfit',sans-serif; font-weight:800; font-size:1.05rem; color:var(--primary);
    }
    .price-period { font-size:0.68rem; color:var(--muted); font-weight:400; }
    .speed-dots { display:flex; gap:3px; align-items:center; margin-top:5px; }
    .speed-dot {
      width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.1);
      transition:background 0.3s ease;
    }
    .plan-option.selected .speed-dot.active { background:var(--primary); box-shadow:0 0 6px var(--primary); }
    .plan-option:hover { border-color:var(--border-hover); background:rgba(255,107,26,0.04); transform:translateX(4px); }
    .plan-option.selected {
      border-color:var(--primary); background:var(--primary-dim);
      box-shadow:0 0 24px rgba(255,107,26,0.12), inset 0 0 20px rgba(255,107,26,0.04);
      transform:translateX(4px);
    }
    .plan-option.selected::before { opacity:1; }
    .plan-option.selected .plan-name { color:#fff; }

    /* BILLING CYCLE */
    .billing-cycle h3 {
      font-family:'Outfit',sans-serif; font-size:0.75rem; letter-spacing:0.1em;
      color:var(--muted); margin-bottom:12px;
    }
    .cycle-options { display:flex; gap:8px; flex-wrap:wrap; }
    .cycle-btn {
      border-radius:10px; border:1px solid var(--border); padding:9px 15px;
      background:transparent; color:var(--muted); font-family:'Nunito',sans-serif;
      font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s ease;
      display:flex; align-items:center; gap:6px;
    }
    .cycle-btn:hover { border-color:rgba(255,107,26,0.3); color:var(--text); }
    .cycle-btn.active {
      background:linear-gradient(135deg, var(--accent2), var(--accent));
      border-color:transparent; color:#fff;
      box-shadow:0 4px 20px rgba(255,107,26,0.45);
    }
    .save-badge {
      font-size:0.62rem; background:rgba(57,217,138,0.12); color:var(--green);
      border-radius:999px; padding:2px 6px; font-weight:800; letter-spacing:0.04em;
    }
    .cycle-btn.active .save-badge { background:rgba(255,255,255,0.18); color:#fff; }
    .cycle-btn.annual { border-color:rgba(57,217,138,0.25); color:var(--green); }
    .cycle-btn.annual.active {
      background:linear-gradient(135deg,#1ab86c,#39d98a);
      box-shadow:0 4px 20px rgba(57,217,138,0.4);
    }

    /* OTT ADDONS */
    .addon-options { display:flex; flex-direction:column; gap:9px; }
    .addon-option {
      border:1px solid var(--border); border-radius:14px; padding:13px 18px;
      background:rgba(255,255,255,0.02); cursor:pointer; transition:all 0.25s ease; display:block;
    }
    .addon-option input[type="checkbox"] { display:none; }
    .addon-content {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .addon-content h4 { font-size:0.88rem; font-weight:600; color:var(--text); }
    .addon-sub { font-size:0.73rem; color:var(--muted); margin-top:3px; }
    .addon-price {
      font-family:'Outfit',sans-serif; font-weight:800; font-size:0.93rem; color:var(--gold);
    }
    .addon-check {
      width:18px; height:18px; border:1.5px solid var(--border); border-radius:5px;
      flex-shrink:0; transition:all 0.2s ease; display:flex; align-items:center; justify-content:center;
    }
    .addon-option:has(input:checked) { border-color:var(--gold); background:rgba(255,186,0,0.08); }
    .addon-option:has(input:checked) .addon-check {
      background:var(--gold); border-color:var(--gold);
    }
    .addon-option:has(input:checked) .addon-check::after {
      content:''; display:block; width:10px; height:7px;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 10 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3.5L3.5 6L9 1' stroke='%230a0a0f' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat:no-repeat; background-size:contain;
    }
    .addon-option:hover { border-color:rgba(255,186,0,0.35); transform:translateX(4px); }

    /* PAYMENT */
    .payment-method h2 {
      font-family:'Outfit',sans-serif; font-weight:700; font-size:0.93rem;
      letter-spacing:0.06em; color:var(--text); margin-bottom:16px;
    }
    .payment-options { display:flex; flex-direction:column; gap:9px; }
    .payment-option {
      border:1px solid var(--border); border-radius:14px; padding:13px 18px;
      cursor:pointer; transition:all 0.25s ease; display:block; background:rgba(255,255,255,0.02);
    }
    .payment-option input[type="radio"] { display:none; }
    .payment-content { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .payment-info h4 { font-size:0.88rem; font-weight:600; color:var(--text); margin-bottom:3px; }
    .payment-info p { font-size:0.76rem; color:var(--muted); }
    .payment-icons { display:flex; gap:6px; }
    .payment-icon {
      width:34px; height:22px; background:var(--surface2); border:1px solid var(--border);
      border-radius:5px; font-size:0.6rem; font-weight:700;
      display:flex; align-items:center; justify-content:center; color:var(--muted);
    }
    .payment-option:hover { border-color:var(--border-hover); background:rgba(255,107,26,0.03); }
    .payment-option.selected {
      border-color:var(--primary); background:var(--primary-dim);
      box-shadow:0 0 18px rgba(255,107,26,0.1);
    }
    .payment-option.selected .payment-info h4 { color:var(--primary); }

    /* RIGHT PANEL */
    .right-panel { position:sticky; top:24px; animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.4s both; }
    .checkout-summary {
      background:rgba(19,19,26,0.92);
      border:1px solid var(--border);
      border-radius:24px; padding:26px;
      backdrop-filter:blur(24px); position:relative; overflow:hidden;
    }
    .checkout-summary::before {
      content:''; position:absolute; top:-70px; right:-70px; width:180px; height:180px;
      background:radial-gradient(circle, rgba(255,107,26,0.1), transparent 65%);
      pointer-events:none;
    }
    .summary-title {
      font-family:'Outfit',sans-serif; font-weight:800; font-size:0.75rem;
      letter-spacing:0.12em; color:var(--muted); margin-bottom:18px;
    }
    .total-payable {
      background:linear-gradient(135deg, rgba(255,107,26,0.12), rgba(255,149,0,0.06));
      border:1px solid rgba(255,107,26,0.22); border-radius:16px;
      padding:18px 20px; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
    }
    .total-label { font-size:0.8rem; color:var(--muted); font-weight:500; }
    .total-amount {
      font-family:'Outfit',sans-serif; font-size:2rem; font-weight:800;
      color:var(--primary); text-shadow:0 0 24px rgba(255,107,26,0.45);
      transition:all 0.3s ease;
    }
    .price-breakdown { border-top:1px solid var(--border); padding-top:16px; margin-bottom:20px; }
    .breakdown-item {
      display:flex; justify-content:space-between; align-items:center;
      padding:7px 0; font-size:0.83rem; color:var(--muted);
    }
    .breakdown-item label {
      display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--muted); font-size:0.83rem;
    }
    .breakdown-item input[type="checkbox"] { width:14px; height:14px; accent-color:var(--primary); cursor:pointer; }
    .breakdown-total {
      display:flex; justify-content:space-between; font-size:0.88rem; font-weight:700;
      color:var(--text); border-top:1px dashed var(--border); margin-top:8px; padding-top:12px;
    }

    /* PAY BUTTON */
    .pay-btn {
      width:100%; border:none; border-radius:14px;
      background:linear-gradient(135deg, #e63c00, #ff9500);
      color:#fff; font-family:'Outfit',sans-serif; font-size:1rem; font-weight:800;
      padding:16px 20px; cursor:pointer; letter-spacing:0.04em;
      transition:all 0.25s cubic-bezier(0.22,1,0.36,1);
      box-shadow:0 8px 32px -8px rgba(255,107,26,0.7);
      position:relative; overflow:hidden;
    }
    .pay-btn::before {
      content:''; position:absolute; top:-50%; left:-60%; width:60%; height:200%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform:skewX(-20deg); transition:left 0.6s ease;
    }
    .pay-btn:hover::before { left:120%; }
    .pay-btn:hover { transform:translateY(-2px); box-shadow:0 16px 48px -12px rgba(255,107,26,0.85); }
    .pay-btn:active { transform:translateY(0); }

    /* SECURITY BADGES */
    .security-badges { display:flex; gap:8px; flex-wrap:wrap; margin-top:18px; }
    .badge {
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:999px; padding:6px 12px;
      display:flex; align-items:center; gap:6px; font-size:0.73rem; color:var(--muted);
    }
    .badge-dot {
      width:14px; height:14px; background:var(--green); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
    }

    /* SIGNAL RINGS */
    .signal-rings { position:absolute; bottom:22px; right:22px; width:50px; height:50px; pointer-events:none; opacity:0.12; }
    .ring { position:absolute; border:1px solid var(--primary); border-radius:50%; animation:expand 3s ease-out infinite; }
    .ring:nth-child(1){width:20px;height:20px;top:15px;left:15px;animation-delay:0s;}
    .ring:nth-child(2){width:35px;height:35px;top:7px;left:7px;animation-delay:0.7s;}
    .ring:nth-child(3){width:50px;height:50px;top:0;left:0;animation-delay:1.4s;}
    @keyframes expand {
      0%{opacity:0.9;transform:scale(0.7);}
      100%{opacity:0;transform:scale(1.2);}
    }

    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}

    @media(max-width:960px){.main-content{grid-template-columns:1fr;}.right-panel{position:static;}}
    @media(max-width:560px){.header{padding:14px 16px;}.cycle-btn{padding:8px 10px;font-size:0.76rem;}}
  </style>
</head>

                <div style="color:var(--muted);">
                  <svg width="32" height="22" viewBox="0 0 32 22" fill="none">
                    <rect width="32" height="22" rx="3" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <rect x="2" y="8" width="28" height="3" fill="rgba(255,255,255,0.08)"/>
                  </svg>
                </div>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="cash">
              <div class="payment-content">
                <div class="payment-info">
                  <h4>Cash on Collection</h4>
                  <p>Pay when we arrive</p>
                  <p style="color:rgba(255,79,126,0.8);font-size:0.72rem;margin-top:4px;">⚠ Section under construction — contact support</p>
                </div>
                <div style="color:var(--muted);">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="7" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/>
                  </svg>
                </div>
              </div>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="checkout-summary">
        <div class="signal-rings">
          <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        </div>
        <div class="summary-title">ORDER SUMMARY</div>
        <div class="total-payable">
          <span class="total-label">Total Payable</span>
          <span class="total-amount">₹499</span>
        </div>
        <div class="breakdown-item">
          <label><input type="checkbox" id="gstCheckbox"> Add GST Bill (18%)</label>
        </div>
        <div class="price-breakdown">
          <div class="breakdown-item">
            <span>Plan Charges</span><span id="planCharges">₹499</span>
          </div>
          <div class="breakdown-item">
            <span>GST (18%)</span><span id="gstAmount">₹0</span>
          </div>
          <div class="breakdown-total">
            <span>Total Pay</span><span class="final-amount">₹499</span>
          </div>
        </div>
        <button class="pay-btn">Pay Now ₹499</button>
        <div class="security-badges">
          <div class="badge">
            <div class="badge-dot">
              <svg width="8" height="7" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="#0a0a0f" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <span>Secure</span>
          </div>
          <div class="badge">
            <div class="badge-dot">
              <svg width="8" height="8" viewBox="0 0 10 10" fill="none">
                <rect x="1" y="4" width="8" height="5" rx="1" fill="#0a0a0f"/>
                <path d="M3 4V3C3 1.9 3.9 1 5 1s2 .9 2 2v1" stroke="#0a0a0f" stroke-width="1.3"/>
              </svg>
            </div>
            <span>Encrypted</span>
          </div>
          <div class="badge">
            <div class="badge-dot">
              <svg width="8" height="7" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="#0a0a0f" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <span>Verified</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  const upiId = '9765009850@okbizaxis';
  const upiName = 'COUNTRYLINK BROADBAND SERVICES';
  const upiNote = 'Countrylink Broadband Subscription';
  let billingCycle = 'monthly';

  document.querySelectorAll('.plan-option').forEach(option => {
    option.addEventListener('click', () => {
      document.querySelectorAll('.plan-option').forEach(o => o.classList.remove('selected'));
      option.classList.add('selected');
      const radio = option.querySelector('input[type="radio"]');
      if (radio) radio.checked = true;
      calculateTotal();
    });
  });

  document.querySelectorAll('.payment-option').forEach(option => {
    option.addEventListener('click', () => {
      document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
      option.classList.add('selected');
      const radio = option.querySelector('input[type="radio"]');
      if (radio) radio.checked = true;
    });
  });

  document.querySelectorAll('.cycle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      billingCycle = btn.dataset.cycle || 'monthly';
      updatePrimeAddon();
      calculateTotal();
    });
  });

  function updatePrimeAddon() {
    const prime = document.querySelector('input[value="prime"]');
    if (!prime) return;
    if (billingCycle !== 'annual') {
      prime.checked = false; prime.disabled = true;
      prime.closest('.addon-option').style.opacity = '0.5';
    } else {
      prime.disabled = false;
      prime.closest('.addon-option').style.opacity = '1';
    }
  }

  function calculateTotal() {
    const planInput = document.querySelector('input[name="plan"]:checked');
    let planPrice = Number(planInput?.dataset.price) || 0;
    let months = 1, discountRate = 0;
    if (billingCycle === 'quarterly')  { months = 3;  discountRate = 0.10; }
    if (billingCycle === 'semiannual') { months = 6;  discountRate = 0.20; }
    if (billingCycle === 'annual')     { months = 12; discountRate = 0.25; }
    const basePlanTotal = planPrice * months;
    const discountedPlan = basePlanTotal - basePlanTotal * discountRate;
    document.getElementById('planCharges').innerText = `₹${Math.round(discountedPlan)}`;
    let addonTotal = 0;
    document.querySelectorAll('input[name="addon"]:checked').forEach(a => {
      const price = Number(a.dataset.price) || 0;
      if (a.value === 'prime') { if (billingCycle === 'annual') addonTotal += price; }
      else addonTotal += price * months;
    });
    let subtotal = discountedPlan + addonTotal;
    let gst = document.getElementById('gstCheckbox')?.checked ? subtotal * 0.18 : 0;
    const total = Math.round(subtotal + gst);
    document.querySelector('.total-amount').innerText = `₹${total}`;
    document.querySelector('.final-amount').innerText = `₹${total}`;
    document.getElementById('gstAmount').innerText = gst ? `₹${Math.round(gst)}` : '₹0';
    document.querySelector('.pay-btn').innerText = `Pay Now ₹${total}`;
  }

  document.querySelectorAll('input').forEach(el => el.addEventListener('change', calculateTotal));

  async function payWithRazorpay(amount) {
    amount = Number(amount);
    if (!amount || amount <= 0) { alert("Invalid payment amount. Please refresh the page."); return; }
    let order;
    try {
      const res = await fetch('create-order.php', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount })
      });
      if (!res.ok) { alert('Order API error: ' + await res.text()); return; }
      order = await res.json();
    } catch (err) { alert('Network or server error: ' + err); return; }
    const options = {
      key: "rzp_live_S2uFzG02Xbl4AA", amount: order.amount, currency: "INR",
      name: "CountryLink Broadband", description: "Internet Subscription", order_id: order.id,
      handler: function(response) { alert("Payment Successful ✅"); },
      theme: { color: "#ff6b1a" }
    };
    new Razorpay(options).open();
  }

  function buildUpiQrUrl(amount, planName) {
    const payload = new URLSearchParams({
      pa: upiId, pn: upiName,
      tn: planName ? `${upiNote} - ${planName}` : upiNote,
      am: amount.toFixed(2), cu: 'INR'
    });
    return `https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent('upi://pay?' + payload.toString())}`;
  }

  function showUpiQrPopup({ amount, planName }) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(10px);';
    const card = document.createElement('div');
    card.style.cssText = 'background:#13131a;border:1px solid rgba(255,107,26,0.25);border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:16px;align-items:center;max-width:90%;width:360px;text-align:center;box-shadow:0 0 60px rgba(255,107,26,0.15);';
    const title = document.createElement('h3');
    title.innerText = 'Scan & Pay with UPI';
    title.style.cssText = 'margin:0;font-family:Outfit,sans-serif;font-size:1.1rem;color:#f0ede8;';
    const summary = document.createElement('p');
    summary.innerHTML = `<strong style="color:#ff6b1a">₹${amount.toFixed(2)}</strong> · ${planName || 'Selected Plan'}`;
    summary.style.cssText = 'margin:0;font-size:0.88rem;color:#8a8490;';
    const img = document.createElement('img');
    img.src = buildUpiQrUrl(amount, planName);
    img.alt = 'UPI QR code';
    img.style.cssText = 'max-width:100%;border:1px solid rgba(255,107,26,0.15);border-radius:12px;';
    const upiText = document.createElement('p');
    upiText.innerHTML = `UPI ID: <strong style="color:#ff6b1a">${upiId}</strong><br><span style="color:#8a8490">${upiName}</span>`;
    upiText.style.cssText = 'margin:0;font-size:0.82rem;line-height:1.6;color:#f0ede8;';
    const close = document.createElement('button');
    close.innerText = 'Close';
    close.style.cssText = 'padding:10px 24px;border-radius:999px;border:none;background:linear-gradient(135deg,#e63c00,#ff9500);color:#fff;cursor:pointer;font-family:Outfit,sans-serif;font-weight:800;';
    close.onclick = () => document.body.removeChild(overlay);
    card.append(title, summary, img, upiText, close);
    overlay.appendChild(card);
    document.body.appendChild(overlay);
  }

  document.querySelector('.pay-btn').addEventListener('click', () => {
    calculateTotal();
    setTimeout(() => {
      const selectedPayment = document.querySelector('input[name="payment"]:checked')?.value;
      const amount = parseInt(document.querySelector('.final-amount').innerText.replace(/[^0-9]/g, ''), 10);
      if (!amount || isNaN(amount) || amount < 10) { alert("Invalid or too low payment amount. Please check your selection."); return; }
      if (selectedPayment === 'upi') {
        const planName = document.querySelector('input[name="plan"]:checked')?.dataset.planName;
        showUpiQrPopup({ amount, planName });
      }
      if (selectedPayment === 'card') payWithRazorpay(amount);
      if (selectedPayment === 'cash') alert("Home collection request will be submitted.");
    }, 0);
  });

  updatePrimeAddon();
  calculateTotal();
</script>
</body>
</html>
